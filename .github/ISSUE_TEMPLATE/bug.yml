name: Bug Report
description: Report a bug in an Astryx Svelte component.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Steps to reproduce, a minimal Svelte example, or a link to a Svelte Storybook/example route that demonstrates the issue.
      placeholder: |
        1. Render `<Button variant="primary" />`
        2. Click the button while in loading state
        3. Focus is lost
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Astryx Svelte Version
      placeholder: "@astryxdesign/svelte@0.x.x"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, assistive technology (if applicable).
      placeholder: "Chrome 125, macOS 15, VoiceOver"
    validations:
      required: false
